name: Compilar LaTeX con XeLaTeX

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Instalar fuentes desde fonts/
        run: |
          # Verificar que las fuentes existen
          ls -la fonts/
          # Crear directorio e instalar
          sudo mkdir -p /usr/share/fonts/truetype/custom
          sudo cp fonts/*.ttf /usr/share/fonts/truetype/custom/ 2>/dev/null || \
          sudo cp fonts/*.TTF /usr/share/fonts/truetype/custom/
          sudo fc-cache -fv
          # Verificar instalación
          fc-list | grep -i "plex" || echo "Fuente IBM Plex no encontrada"

      - name: Compilar con XeLaTeX
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          latexmk_use_xelatex: true
          latexmk_shell_escape: true
          args: -interaction=nonstopmode -halt-on-error

      - name: Subir PDF como artifact (debug)
        uses: actions/upload-artifact@v6
        with:
          name: PDF-generado
          path: main.pdf
          if-no-files-found: error

      - name: Crear Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.run_number }}"
          name: "Documento v${{ github.run_number }}"
          files: main.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
